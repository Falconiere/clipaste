name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: make build

      - name: Verify binary
        run: ./clipaste --version

      - name: Create tarball
        run: |
          tar czf clipaste-${{ github.ref_name }}-macos.tar.gz clipaste

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: clipaste-${{ github.ref_name }}-macos.tar.gz
          generate_release_notes: true
